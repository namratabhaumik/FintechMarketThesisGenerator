name: CI with Private Submodule

on:
  push:
    branches: 
      - master
  pull_request:
    branches: 
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.FINTHESIS_APP_ID }}
        private-key: ${{ secrets.FINTHESIS_APP_PRIVATE_KEY }}
        repositories: ${{ secrets.FINTHESIS_INTERNAL_REPO }}

    - name: Configure git to use token for private submodule
      run: |
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"

    - name: Update private submodule
      run: |
        git submodule init
        git submodule update --remote --recursive

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync --group dev

    - name: Lint with ruff
      run: uv run ruff check .

    - name: Run tests
      run: uv run python run_tests.py

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Generate API types from the OpenAPI schema
      working-directory: frontend
      run: npm run generate

    - name: Typecheck frontend against the generated types
      working-directory: frontend
      run: npm run typecheck
