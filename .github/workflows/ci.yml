name: CI with Private Submodule

on:
  push:
    branches: [ master, feat/* ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.FINTHESIS_APP_ID }}
        private-key: ${{ secrets.FINTHESIS_APP_PRIVATE_KEY }}
        repositories: ${{ secrets.FINTHESIS_INTERNAL_REPO }}

    - name: Configure git to use token for private submodule
      run: |
        git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"

    - name: Update private submodule
      run: |
        git submodule init
        git submodule update --recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run tests
      run: |
        python run_tests.py
